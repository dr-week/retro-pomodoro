<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal Retro Pomodoro</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      /* Minimal Vintage Background & Body */
      body {
        background-image:
          linear-gradient(rgba(34, 34, 34, 0.05), rgba(34, 34, 34, 0.85)),
          url("https://images.unsplash.com/photo-1522441815192-d9f04eb0615c?q=80&w=627&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
        background-size: cover;
        background-position: center;
        background-color: #222; 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh; /* Changed to min-height for mobile scrolling */
        margin: 0;
        font-family: monospace;
      }

      /* INCREASED SIZE: Main App Container */
      #app {
        background: #d6d8d8;
        padding: 30px; /* More padding */
        border-radius: 40px;
        box-shadow: 5px 5px 25px rgba(0, 0, 0, 0.4);
        text-align: center;
        
        /* Made responsive: takes up 95% of phone screen, caps at 420px on desktop */
        width: 95%;
        max-width: 420px; 
      }

      /* INCREASED SIZE: Round Vinyl Player Base */
      .vinyl-player {
        width: 320px; /* Scaled up from 240px */
        height: 320px; /* Scaled up from 240px */
        margin: 0 auto 20px;
        border-radius: 50%;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 4px 4px 15px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        background: #111;
      }

      .vinyl-texture {
        position: absolute;
        width: 120%;
        height: 120%;
        object-fit: cover;
        opacity: 0.5;
      }

      /* INCREASED SIZE: Center Record Label & Text */
      .record-label {
        background: #d9534f;
        width: 110px; /* Scaled up from 80px */
        height: 110px; /* Scaled up from 80px */
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2;
        border: 5px solid #111;
        font-size: 1.8rem; /* Much larger timer text */
        font-weight: bold;
        color: rgb(228, 225, 225);
      }

      .spin {
        animation: rotate 1.8s linear infinite ;
      }
      @keyframes rotate {
        100% { transform: rotate(360deg); }
      }

      /* INCREASED SIZE: Now Playing Text */
      .now-playing {
        margin-top: 10px;
        margin-bottom: -5px; 
        font-size: 0.9rem; /* Larger font */
        color: #333;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* INCREASED SIZE: Analog Meter Window */
      .meter-window {
        width: 100%; 
        height: 120px; /* Taller window (up from 80px) */
        border-radius: 20px; 
        border: 2px solid #555; 
        overflow: hidden; 
        margin-top: 15px; 
        position: relative;
      }

      .analog-meter {
        width: 100%; 
        height: 100%; 
        object-fit: cover; 
        filter: sepia(0.6); 
        transform: scale(1.5); 
        transition: opacity 0.3s ease, object-position 1s linear; 
      }

      /* Glowing Overlay Text */
      .now-playing {
        position: absolute; /* Sticks the text over the image */
        bottom: 10px;       /* Pushes it near the bottom edge */
        width: 100%;        /* Spans the whole width */
        text-align: center; /* Centers the text perfectly */
        z-index: 10;        /* Ensures it sits on top of the image */
        
        font-size: 0.95rem;
        color: #fff; /* White text looks best with a cyan glow */
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
        white-space: prewrap; /* Allows text to wrap if it's too long */
        
        /* Triggers the pulsing animation below */
        animation: textGlowPulse 1.5s infinite alternate;
      }

      /* The Animation Keyframes */
      @keyframes textGlowPulse {
        from { 
          text-shadow: 0 0 2px #fff, 0 0 5px #0ff; 
        }
        to { 
          text-shadow: 0 0 5px #fff, 0 0 15px #0ff, 0 0 30px #0ff; 
        }
      }

      /* INCREASED SIZE: Time Setter */
      .time-setter {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        font-size: 1.1rem;
        color: #333;
        font-weight: bold;
      }
      .time-setter input {
        width: 70px; /* Wider input box */
        padding: 10px; /* Taller input box */
        font-size: 1.2rem; /* Bigger text */
        background: #eee;
        border: 2px solid #555;
        font-family: monospace;
        text-align: center;
        border-radius: 5px;
      }

      /* INCREASED SIZE: Buttons */
      .controls {
        margin-top: 20px;
        display: flex;
        gap: 15px;
        justify-content: center;
      }
      button {
        background: #222;
        color: #fff;
        border: none;
        padding: 15px 30px; /* Fat-finger friendly padding */
        font-size: 1.2rem; /* Larger button text */
        font-weight: bold;
        cursor: pointer;
        font-family: monospace;
        border-radius: 8px; /* Softer curves */
        transition: background 0.2s, transform 0.1s;
      }
      button:active {
        background: #555;
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="vinyl-player" :class="{ spin: isRunning }">
        <img
          src="https://images.unsplash.com/photo-1632494425431-e8b9bc198390?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          class="vinyl-texture"
        />
        <div class="record-label">{{ timeDisplay }}</div>
      </div>

      

      <div class="meter-window">
        <img
          src="https://images.unsplash.com/photo-1573655349936-de6bed86f839?q=80&w=720&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
          class="analog-meter"
          :style="{ opacity: isRunning ? 1 : 0.4, 
        objectPosition: `50% ${meterPan}%` }"
        />
        <div class="now-playing" v-if="isRunning">
        {{ playlist[currentTrackIndex].title }}
      </div>
      </div>
      
      <div class="time-setter" v-if="!isRunning">
        <input type="number" v-model.number="customMinutes" min="1" max="120" />
        <span>MIN</span>
      </div>
      <div class="controls">
        <button @click="togglePlayPause">{{ isRunning ? 'PAUSE' : 'PLAY' }}</button>
        <button @click="reset">EJECT</button>
      </div>
    </div>

    <script>
      const { createApp, ref, computed } = Vue;

      createApp({
        setup() {
          const customMinutes = ref(25);
          const totalTime = ref(1500);
          const time = ref(1500);
          
          const isRunning = ref(false);
          let interval = null;

          const playlist = [
          { 
            title: "09 Underwater Disco", 
            url: "https://archive.org/download/w-w-w-d-e-e-p-d-i-v-e-c-o-m-wg7bkk/Webinar%E2%84%A2%20-%20w%20w%20w%20.%20d%20e%20e%20p%20d%20i%20v%20e%20.%20c%20o%20m%20-%2009%20Underwater%20Disco.flac" 
          },
          { 
            title: "10 Vaporwave Mall", 
            url: "https://archive.org/download/w-w-w-d-e-e-p-d-i-v-e-c-o-m-wg7bkk/Webinar%E2%84%A2%20-%20w%20w%20w%20.%20d%20e%20e%20p%20d%20i%20v%20e%20.%20c%20o%20m%20-%2010%20Welcome%20To%20The%20Mall.flac" 
          }
        ];

        const currentTrackIndex = ref(0);
        
        const bgMusic = new Audio(playlist[currentTrackIndex.value].url);
        bgMusic.volume = 0.5;

        bgMusic.addEventListener('ended', () => {
          currentTrackIndex.value = (currentTrackIndex.value + 1) % playlist.length;
          bgMusic.src = playlist[currentTrackIndex.value].url;
          bgMusic.play();
        });

          const start = () => {
            if (isRunning.value) return;

            const expectedSeconds = customMinutes.value * 60;
            if (time.value === totalTime.value) {
              totalTime.value = expectedSeconds;
              time.value = expectedSeconds;
            }
            isRunning.value = true;
            bgMusic.play(); 

            interval = setInterval(() => {
              if (time.value > 0) time.value--;
               else reset(); 
             }, 1000);
          }

          const pause = () => {
            isRunning.value = false;
            clearInterval(interval);
            bgMusic.pause(); 
          };

          const togglePlayPause = () => {
            if (isRunning.value) {
              pause();
            } else {
              start();
            }
          };

          const reset = () => {
            pause();
            time.value = totalTime.value; 
            bgMusic.pause(); 
            bgMusic.currentTime = 0; 
          };

          const timeDisplay = computed(() => {
            const m = Math.floor(time.value / 60)
              .toString()
              .padStart(2, "0");
            const s = (time.value % 60).toString().padStart(2, "0");
            return `${m}:${s}`;
          });

          const meterPan = computed(() => {
            return (time.value / totalTime.value) * 100;
          });

          return {
            timeDisplay,
            isRunning,
            start,
            pause,
            reset,
            meterPan,
            customMinutes,
            togglePlayPause,
            playlist,
            currentTrackIndex
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
